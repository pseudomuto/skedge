[settings]
# Required for `mise deps` and the [deps.*] tables below.
experimental = true

[tools]
go = "1.26"
mkcert = "1.4.4"

################################################################################
# Dependencies
################################################################################

[deps.go]

[deps.tools]
sources = ["mise.toml"]
outputs = ["dev/tools.sum"]
description = "Sync dev tools"
run = """
  go get -tool -modfile=dev/tools.mod github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8
  go get -tool -modfile=dev/tools.mod go.uber.org/mock/mockgen@v0.6.0
  go mod tidy -modfile=dev/tools.mod 2>/dev/null || true
"""

################################################################################
# Development Tasks
################################################################################

[tasks.lint]
description = "Lint Go files"
run = ["go tool -modfile=dev/tools.mod golangci-lint run"]

[tasks.format]
description = "Format Go files"
run = ["go fix ./...", "go tool -modfile=dev/tools.mod golangci-lint fmt"]

[tasks.test]
description = "Run unit tests"
run = "go test -cover ./..."
