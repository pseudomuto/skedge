[settings]
# Required for `mise deps` and the [deps.*] tables below.
experimental = true

[tools]
node = "26"

[tasks.dev]
description = "Start the development server"
run = "npm run dev"
dir = "{{config_root}}"

[tasks.build]
description = "Build for production"
run = "npm run build"
dir = "{{config_root}}"

[tasks.test]
description = "Run unit tests"
run = "npm run test -- --run"
dir = "{{config_root}}"

[tasks.fmt]
description = "Format files"
run = "npm run format"
dir = "{{config_root}}"

[tasks.lint]
description = "Lint files"
run = "npm run lint"
dir = "{{config_root}}"
