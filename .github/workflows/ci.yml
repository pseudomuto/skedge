name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mise and tools
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: mise run lint

      - name: Test
        run: mise run test
